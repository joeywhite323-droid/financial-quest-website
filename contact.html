<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact & Inquiries | Financial Quest</title>
  <meta name="description" content="Get in touch with the team at Financial Quest to begin building your structural wealth matrix.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0A192F',
            charcoal: '#334155',
            teal: '#14B8A6',
            light: '#F8FAFC'
          },
          fontFamily: {
            heading: ['Merriweather', 'serif'],
            body: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@300;400;700;900&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8FAFC;
      color: #334155;
    }
    h1, h2, h3, h4, h5, h6, .font-heading {
      font-family: 'Merriweather', serif;
    }
    .hero-bg {
      background-image: linear-gradient(rgba(10, 25, 47, 0.9), rgba(10, 25, 47, 0.4)), url('img/contact_hero.png');
      background-size: cover;
      background-position: center center;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(226, 232, 240, 0.8);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
    }
  </style>
  <script src="js/shared.js" defer></script>
</head>
<body class="pt-20">

  <section class="hero-bg text-white py-24 md:py-40 relative overflow-hidden">
    <!-- Blank hero section solely for aesthetic backdrop -->
  </section>

  <section class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16 -mt-32 relative z-10">

      <!-- Form Column -->
      <div class="glass-card rounded-2xl p-8 md:p-12">
        <h3 class="text-2xl font-heading text-navy font-bold mb-2">Book a Strategy Session</h3>
        <p class="text-charcoal mb-8 text-sm">Submit your inquiry below. A senior wealth architect will reach out within 24 hours.</p>

        <form class="space-y-6" onsubmit="event.preventDefault(); alert('Message simulation sent. Hook this up to Formspree or Netlify for real back-end capture!');">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-bold text-navy mb-1">First Name</label>
              <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded focus:ring-2 focus:ring-teal focus:border-teal outline-none transition-colors" placeholder="Jane" />
            </div>
            <div>
              <label class="block text-sm font-bold text-navy mb-1">Last Name</label>
              <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded focus:ring-2 focus:ring-teal focus:border-teal outline-none transition-colors" placeholder="Doe" />
            </div>
          </div>
          
          <div>
            <label class="block text-sm font-bold text-navy mb-1">Email Address</label>
            <input type="email" required class="w-full px-4 py-3 border border-gray-300 rounded focus:ring-2 focus:ring-teal focus:border-teal outline-none transition-colors" placeholder="jane@example.com" />
          </div>

          <div>
            <label class="block text-sm font-bold text-navy mb-1">Topic of Interest</label>
            <select class="w-full px-4 py-3 border border-gray-300 rounded focus:ring-2 focus:ring-teal focus:border-teal outline-none bg-white text-gray-700">
              <option>Tax Structuring & Harvesting</option>
              <option>Retirement Distribution Matrix</option>
              <option>Legacy Succession & Probate</option>
              <option>Life Coverage Analysis</option>
              <option>Full Structural Overhaul</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-bold text-navy mb-1">Message</label>
            <textarea rows="4" required class="w-full px-4 py-3 border border-gray-300 rounded focus:ring-2 focus:ring-teal focus:border-teal outline-none transition-colors" placeholder="Briefly describe your current situation or immediate concerns..."></textarea>
          </div>
          
          <button type="submit" class="w-full bg-teal hover:bg-teal/90 text-white font-bold py-4 px-4 rounded shadow-lg transition-transform hover:-translate-y-1 mt-6 text-lg">
            Dispatch Confidential Inquiry
          </button>
        </form>
  </section>

</body>
</html>
